services:
  - type: web
    name: futbol-xabar-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: futbol-xabar-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHANNEL_ID
        sync: false
      - key: AUTO_PUBLISH
        value: "true"
      - key: AUTO_TELEGRAM
        value: "true"
      - key: PIPELINE_INTERVAL
        value: "3600"
      - key: FRONTEND_ORIGIN
        value: "https://futbolxabar.uz"

databases:
  - name: futbol-xabar-db
    plan: free
